<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Watchlist">
  <title>My Watchlist</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1c1c28;--border:#2a2a3a;--accent:#e8b86d;--accent2:#6d9be8;--text:#e8e8f0;--muted:#6b6b80;--danger:#e86d6d;--success:#6de8a0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}
    #app{max-width:760px;margin:0 auto;padding:0 16px 80px}

    #setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
    .setup-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,10vw,4rem);letter-spacing:.04em;margin-bottom:8px}
    .setup-logo span{color:var(--accent)}
    .setup-tagline{color:var(--muted);font-size:.88rem;margin-bottom:48px}
    .setup-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;width:100%;max-width:640px;margin-bottom:32px}

    .create-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;flex:1;min-width:240px;max-width:300px;text-align:left;transition:border-color .2s}
    .create-card:focus-within{border-color:var(--accent)}
    .create-card-icon{font-size:1.8rem;margin-bottom:12px}
    .create-card-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);margin-bottom:4px}
    .create-card-desc{font-size:.78rem;color:var(--muted);margin-bottom:16px;line-height:1.5}
    .create-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:12px}
    .create-name-input:focus{border-color:var(--accent)}
    .create-name-input::placeholder{color:var(--muted)}
    .create-btn{width:100%;background:var(--accent);color:#0a0a0f;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:opacity .2s}
    .create-btn:hover{opacity:.85}

    .join-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;flex:1;min-width:240px;max-width:300px;text-align:left;transition:border-color .2s}
    .join-card:focus-within{border-color:var(--accent2)}
    .join-card-icon{font-size:1.8rem;margin-bottom:12px}
    .join-card-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent2);margin-bottom:4px}
    .join-card-desc{font-size:.78rem;color:var(--muted);margin-bottom:16px;line-height:1.5}
    .join-link-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:12px}
    .join-link-input:focus{border-color:var(--accent2)}
    .join-link-input::placeholder{color:var(--muted)}
    .join-btn{width:100%;background:var(--accent2);color:#0a0a0f;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:opacity .2s}
    .join-btn:hover{opacity:.85}
    .setup-error{color:var(--danger);font-size:.8rem;margin-top:8px;min-height:18px;text-align:center}

    .header{padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;position:relative;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header::after{content:'';position:absolute;bottom:-1px;left:0;width:60px;height:2px;background:var(--accent)}
    .header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3rem);letter-spacing:.04em;line-height:1}
    .header h1 span{color:var(--accent)}
    .header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .stats{display:flex;gap:20px;flex-wrap:wrap}
    .stat{display:flex;flex-direction:column;gap:1px}
    .stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--accent);line-height:1}
    .stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .stat-divider{width:1px;background:var(--border);align-self:stretch}
    .sync-indicator{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:5px}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0}
    .sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
    .sync-dot.error{background:var(--danger)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    #room-banner{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    #room-banner.hidden{display:none}
    .room-info{flex:1;min-width:0}
    .room-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
    .room-url{font-size:.78rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-family:monospace}
    .room-url:hover{text-decoration:underline}
    .room-actions{display:flex;gap:6px;flex-shrink:0}
    .room-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.73rem;cursor:pointer;transition:all .15s}
    .room-btn:hover{border-color:var(--accent);color:var(--accent)}

    #config-notice{background:rgba(232,184,109,.07);border:1px solid rgba(232,184,109,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:.8rem;line-height:1.7}
    #config-notice.hidden{display:none}
    #config-notice strong{color:var(--accent)}
    #config-notice code{background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:.75rem;font-family:monospace}

    #install-banner{display:none;background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:10px 14px;margin-bottom:16px;align-items:center;gap:10px}
    #install-banner.show{display:flex}
    #install-banner p{flex:1;font-size:.82rem}
    #install-banner p span{color:var(--accent);font-weight:500}
    .banner-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.8rem;cursor:pointer}
    .banner-dismiss{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px}

    .search-area{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
    .search-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px}
    .search-row{display:flex;gap:8px}
    .search-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:var(--muted)}
    .btn{background:var(--accent);color:#0a0a0f;border:none;border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;cursor:pointer;transition:opacity .2s;white-space:nowrap}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .status-bar{font-size:.8rem;margin-top:8px;padding:7px 11px;border-radius:6px}
    .status-loading{color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
    .status-error{color:var(--danger);background:rgba(232,109,109,.08);border:1px solid rgba(232,109,109,.2)}
    .status-empty{color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
    .search-results{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
    .search-result{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:border-color .2s}
    .search-result:hover{border-color:var(--accent)}
    .result-img,.result-emoji{width:32px;height:44px;border-radius:3px;object-fit:cover;flex-shrink:0;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
    .result-info{flex:1;min-width:0}
    .result-name{font-weight:500;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .result-meta{font-size:.7rem;color:var(--muted);margin-top:1px}
    .result-add{font-size:.7rem;color:var(--accent);font-weight:500;flex-shrink:0}

    .toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .filters{display:flex;gap:6px;flex-wrap:wrap}
    .filter-btn{background:transparent;border:1px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;transition:all .2s}
    .filter-btn:hover{color:var(--text);border-color:var(--text)}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:500}
    .filter-btn.active-net{background:var(--accent2);border-color:var(--accent2);color:#0a0a0f;font-weight:500}

    .show-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .show-row{display:flex;align-items:center;gap:10px;padding:13px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s,opacity .2s;animation:fadeIn .2s ease both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .show-list .show-row:last-child{border-bottom:none}
    .show-row:hover{background:var(--surface2)}
    .show-row.expanded{background:var(--surface2)}
    .show-row.dragging{opacity:.4}
    .show-row.drag-over{border-top:2px solid var(--accent)}
    .show-row.done{opacity:.45}
    .row-drag{color:var(--muted);font-size:.85rem;cursor:grab;flex-shrink:0;padding:2px;touch-action:none}
    .row-drag:active{cursor:grabbing}
    .row-main{flex:1;min-width:0}
    .row-top{display:flex;align-items:baseline;gap:8px}
    .row-name{font-size:.95rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-name.done{text-decoration:line-through;color:var(--muted)}
